# Basic experiment configuration (overridden by CLI --overrides)
policy_name: null
task_name: null
task_config: null
ckpt_setting: null
seed: null
instruction_type: unseen

# ── ALRM LLM Agent Configuration ────────────────────────────────
# These parameters configure the Agentic Language Reasoning Model.
# API key is intentionally omitted — set QWEN_API_KEY in .env

# Model / API endpoint
llm_model: qwen3.6-plus
llm_base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1

# Generation parameters
temperature: 0.1
max_tokens: 1024

# Agent loop control
max_turns: 10            # maximum ReAct iterations per episode step
# Note: max_turns is the agent reasoning/action loop limit
# Note: step_lim / take_action_cnt is the RoboTwin eval loop budget (physics steps)
max_retries: 0           # executor code-exec retries (0 = no retry)

# Executor mode
# cap: legacy Code-as-Policy Python executor
# schema: task-specific JSON schema -> primitive program compiler/runtime
# hierarchical_schema: Planner sees only subtask observations; Executor queries env and emits primitive programs
# tap: Tool-as-Policy — Executor picks ONE tool per turn with text observation feedback (max 20 per subtask)
executor_mode: cap
schema_max_retries: 1
hierarchical_executor_max_attempts: 10

# TaP configuration
tap_max_actions: 20              # max tool calls per TaP subtask
tap_model: null                  # inherit QWEN_MODEL by default; override to use a different model for TaP executor
tap_vision_model: null           # v1.5: qwen3-vl-plus or similar VL model
tap_use_vision_input: false      # false = text-only (v1); true = pass snapshot images to LLM (requires VL model)
# v2 perception — 3D scene understanding via SAPIEN segmentation + sim depth.
# false (default) → byte-identical to v1/v1.5 behaviour.
# true            → auto-attaches scene_perception.objects[name] to every
#                   observation after resolve_reference(name) is called, and
#                   registers 5 new tools (3 perception, 2 action).
# May be combined with tap_use_vision_input.
tap_use_perception: false
# Backend selector for VisionPerception.  Phase 1 ships "sim" only.
# Phase 2 will add "qwen-vl", "molmo", "grounded-sam" (see docs).
tap_perception_backend: sim

# Logging
log_dir: logs            # relative to policy directory
verbose: true

# Perception
# Note: "privileged" = Phase 1 (sim state access). This is the only implemented mode. Vision mode is Phase 3+.
perception_mode: privileged    # "privileged" = Phase 1 (sim state access)
